# ──────────────────────────────────────────────────────────────────
#  ros2_control configuration for dual UR5e in Gazebo
#  File: config/dual_ur5e_controllers.yaml
# ──────────────────────────────────────────────────────────────────

controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    # ── Robot 1 controllers ──────────────────────────────────
    robot1_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    robot1_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # ── Robot 2 controllers ──────────────────────────────────
    robot2_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    robot2_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


# ── Robot 1 arm trajectory controller ─────────────────────────────
robot1_arm_controller:
  ros__parameters:
    joints:
      - robot1_shoulder_pan_joint
      - robot1_shoulder_lift_joint
      - robot1_elbow_joint
      - robot1_wrist_1_joint
      - robot1_wrist_2_joint
      - robot1_wrist_3_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

    # Speed scaling — modified at runtime by collision_monitor
    speed_scaling_factor: 1.0

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

      robot1_shoulder_pan_joint:  { trajectory: 0.1, goal: 0.01 }
      robot1_shoulder_lift_joint: { trajectory: 0.1, goal: 0.01 }
      robot1_elbow_joint:         { trajectory: 0.1, goal: 0.01 }
      robot1_wrist_1_joint:       { trajectory: 0.1, goal: 0.01 }
      robot1_wrist_2_joint:       { trajectory: 0.1, goal: 0.01 }
      robot1_wrist_3_joint:       { trajectory: 0.1, goal: 0.01 }


# ── Robot 2 arm trajectory controller ─────────────────────────────
robot2_arm_controller:
  ros__parameters:
    joints:
      - robot2_shoulder_pan_joint
      - robot2_shoulder_lift_joint
      - robot2_elbow_joint
      - robot2_wrist_1_joint
      - robot2_wrist_2_joint
      - robot2_wrist_3_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

    speed_scaling_factor: 1.0

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

      robot2_shoulder_pan_joint:  { trajectory: 0.1, goal: 0.01 }
      robot2_shoulder_lift_joint: { trajectory: 0.1, goal: 0.01 }
      robot2_elbow_joint:         { trajectory: 0.1, goal: 0.01 }
      robot2_wrist_1_joint:       { trajectory: 0.1, goal: 0.01 }
      robot2_wrist_2_joint:       { trajectory: 0.1, goal: 0.01 }
      robot2_wrist_3_joint:       { trajectory: 0.1, goal: 0.01 }