# ──────────────────────────────────────────────────────────────────
#  Collision Avoidance Parameters  —  MULTI-LINK VERSION
#  Uses real UR5e TF frames, no custom sensor frames needed.
#  Works with collision_monitor.py (multi-link capsule edition).
# ──────────────────────────────────────────────────────────────────

collision_monitor:
  ros__parameters:

    # ── Monitoring ────────────────────────────────────────────────
    monitor_rate_hz: 50.0

    # ── Distance thresholds (minimum across ALL link pairs, metres) ──
    # These are now BODY-to-BODY distances, not EE-to-EE.
    # UR5e link radius is ~0.06m, so 0.15m body clearance = 0.15m threshold.
    danger_zone_m:    0.15    # Stop — links about to touch
    slow_zone_m:      0.40    # Start slowing — links getting close
    resume_zone_m:    0.50    # Resume after stop

    # ── Speed scaling ──────────────────────────────────────────────
    min_speed_factor:    0.02  # Near-zero at danger zone edge
    normal_speed_factor: 1.0

    # ── Which robot yields in STOPPED state ───────────────────────
    yield_robot: "robot2"      # robot1 / robot2 / both

    # ── Resume hold time ──────────────────────────────────────────
    resume_delay_sec: 0.8

    # ── Logging ───────────────────────────────────────────────────
    log_events: true
    log_file: "/tmp/collision_avoidance_events.json"

    # ── World frame ───────────────────────────────────────────────
    world_frame: "world"

    # End-effector frames used by collision_monitor.py and marker visualization.
    # Use inner sensor frames so detection/line match intended contact side.
    robot1_ee_frame: "robot1_inner_sensor"
    robot2_ee_frame: "robot2_inner_sensor"


scenario_orchestrator:
  ros__parameters:
    segment_duration_sec: 4.0
    auto_start: true
    start_delay_sec: 3.0